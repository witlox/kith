name: Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 06:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - name: Compute version
        id: version
        run: |
          chmod +x scripts/set-version.sh
          scripts/set-version.sh
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --exclude kith-acceptance
      - run: cargo test -p kith-acceptance

  # ---------------------------------------------------------------------------
  # Build: arch × feature matrix
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.name }})
    needs: preflight
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux ---
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            daemon_features: real-mesh
            cross: false
            shell_only: false
          - name: linux-aarch64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            daemon_features: real-mesh
            cross: true
            shell_only: false

          # --- macOS (agent-only: shell + connect to mesh) ---
          - name: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            daemon_features: ""
            cross: false
            shell_only: true
          - name: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            daemon_features: ""
            cross: false
            shell_only: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.name }}
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install native build deps (Linux)
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Install cross-compilation toolchain (aarch64)
        if: matrix.cross
        run: |
          sudo dpkg --add-architecture arm64
          [ -f /etc/apt/sources.list ] && sudo sed -i '/^deb \[/! s/^deb /deb [arch=amd64] /' /etc/apt/sources.list || true
          for f in /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] && sudo sed -i '/^deb \[/! s/^deb /deb [arch=amd64] /' "$f" || true
          done
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] && grep -q '^Architectures:' "$f" || sudo sed -i '/^Types:/a Architectures: amd64' "$f" || true
          done
          echo 'deb [arch=arm64] http://ports.ubuntu.com/ noble main restricted universe' | sudo tee /etc/apt/sources.list.d/arm64.list
          echo 'deb [arch=arm64] http://ports.ubuntu.com/ noble-updates main restricted universe' | sudo tee -a /etc/apt/sources.list.d/arm64.list
          echo 'deb [arch=arm64] http://ports.ubuntu.com/ noble-security main restricted universe' | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libssl-dev:arm64 pkg-config
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "OPENSSL_DIR=/usr" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/include/aarch64-linux-gnu" >> $GITHUB_ENV

      - name: Set version
        run: |
          chmod +x scripts/set-version.sh
          scripts/set-version.sh

      - name: Build kith (shell)
        run: cargo build --release --target ${{ matrix.target }} -p kith-shell --bin kith

      - name: Build kith-daemon
        if: ${{ !matrix.shell_only }}
        run: >
          cargo build --release --target ${{ matrix.target }}
          -p kith-daemon --bin kith-daemon
          ${{ matrix.daemon_features != '' && format('--features {0}', matrix.daemon_features) || '' }}

      - name: Package
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/kith" dist/
          if [ "${{ matrix.shell_only }}" != "true" ]; then
            cp "target/${{ matrix.target }}/release/kith-daemon" dist/
          fi
          cd dist
          tar czf "../kith-${{ matrix.name }}.tar.gz" *
          cd ..
          shasum -a 256 "kith-${{ matrix.name }}.tar.gz" > "kith-${{ matrix.name }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: kith-${{ matrix.name }}
          path: |
            kith-${{ matrix.name }}.tar.gz
            kith-${{ matrix.name }}.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # Publish: collect all artifacts into a GitHub release
  # ---------------------------------------------------------------------------
  publish:
    name: Publish release
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.preflight.outputs.version }}
          name: kith v${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          body: |
            ## Linux (shell + daemon with Nostr + WireGuard)

            | Archive | Arch |
            |---------|------|
            | `kith-linux-x86_64` | x86_64 |
            | `kith-linux-aarch64` | aarch64 |

            ## macOS (shell only — connects to mesh daemons via gRPC)

            | Archive | Arch |
            |---------|------|
            | `kith-macos-arm64` | Apple Silicon |
            | `kith-macos-x86_64` | Intel |

            ## Docker

            ```bash
            docker build -t kith-daemon .
            ```
          files: |
            kith-*/kith-*.tar.gz
            kith-*/kith-*.tar.gz.sha256
