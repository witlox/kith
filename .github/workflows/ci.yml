name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "specs/**"
      - "*.md"
      - "config/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "specs/**"
      - "*.md"
      - "config/**"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 — fast gates
  # ---------------------------------------------------------------------------

  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Stage 2 — tests (needs stage 1)
  # ---------------------------------------------------------------------------

  test:
    name: Test
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Unit + Integration tests
        run: cargo test --workspace --exclude kith-acceptance

      - name: BDD Acceptance tests
        run: cargo test -p kith-acceptance

  test-features:
    name: Test with features
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Build with Nostr + WireGuard
        run: cargo build -p kith-mesh --features nostr,wireguard

  # ---------------------------------------------------------------------------
  # Stage 3 — container tests (needs stage 2)
  # ---------------------------------------------------------------------------

  docker:
    name: Docker build
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t kith-daemon .

  container-tests:
    name: Container E2E
    runs-on: ubuntu-latest
    needs: [test, docker]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - name: Build Docker image
        run: docker build -t kith-daemon .
      - name: Container tests
        run: cargo test -p kith-e2e --features containers --test containers

  # ---------------------------------------------------------------------------
  # Stage 4 — coverage (needs stage 2)
  # ---------------------------------------------------------------------------

  coverage:
    name: Coverage
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: >
          cargo llvm-cov --workspace
          --exclude kith-acceptance
          --exclude kith-e2e
          --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
