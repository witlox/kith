# Hosted inference via OpenAI API
# Requires: OPENAI_API_KEY environment variable

[inference]
backend = "openai-compatible"
endpoint = "https://api.openai.com/v1"
model = "gpt-4.1"
api_key_env = "OPENAI_API_KEY"

[embedding]
backend = "api"
endpoint = "https://api.openai.com/v1"
model = "text-embedding-3-small"
dimensions = 1536
api_key_env = "OPENAI_API_KEY"
